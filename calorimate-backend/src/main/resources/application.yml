server:
  port: 8081
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:h2:mem:calorimate;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema-h2.sql
      data-locations: classpath:sql/data-h2.sql
  h2:
    console:
      enabled: true
      path: /h2-console

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.calorimate.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: CaloriMate2026SecretKeyForJwtTokenGenerationMustBeLongEnough
  expiration: 86400000

ai:
  api-key: sk-8fcabf24483f438fb8a5301003976aa8
  base-url: https://api.deepseek.com/v1
  model: deepseek-chat

wx:
  appid: your-appid  # 请填写你的微信小程序AppID
  secret: your-secret  # 请填写你的微信小程序AppSecret
